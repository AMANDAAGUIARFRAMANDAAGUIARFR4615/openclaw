name: Trojan Proxy Test

on:
  # push:
  workflow_dispatch:

jobs:
  proxy-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          set -e
          VERSION=1.8.6
          curl -L -o sing-box.tar.gz \
            https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-${VERSION}-linux-amd64/sing-box /usr/local/bin/sing-box
          sing-box version

      - name: Generate sing-box config
        run: |
          cat > config.json << 'EOF'
          {
            "log": {
              "level": "info"
            },
            "inbounds": [
              {
                "type": "socks",
                "tag": "socks-in",
                "listen": "127.0.0.1",
                "listen_port": 1080
              }
            ],
            "outbounds": [
              {
                "type": "trojan",
                "tag": "trojan-out",
                "server": "f533f9b2-c69a-4dd0-bc63-f2ab94dd5f53.f1eb10ae-1d82-4c6a-b4dd-bd9525520956.com",
                "server_port": 10101,
                "password": "${{ secrets.TROJAN_PASSWORD }}",
                "tls": {
                  "enabled": true,
                  "server_name": "sni.eos-suzhou-4.cmecloud.cn"
                }
              }
            ],
            "route": {
              "rules": [
                {
                  "inbound": "socks-in",
                  "outbound": "trojan-out"
                }
              ]
            }
          }
          EOF

      - name: Start trojan proxy
        run: |
          nohup sing-box run -c config.json > sing-box.log 2>&1 &
          sleep 5

      - name: Test with curl
        run: |
          echo "IP info:"
          curl https://ifconfig.me

      - name: Set proxy env and test with curl
        env:
          ALL_PROXY: socks5h://127.0.0.1:1080
          HTTP_PROXY: socks5h://127.0.0.1:1080
          HTTPS_PROXY: socks5h://127.0.0.1:1080
        run: |
          echo "Proxy IP info:"
          curl https://ifconfig.me
