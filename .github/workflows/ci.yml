name: Build Qt Application

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  TELEGRAM_BOT_TOKEN: 8308398668:AAGqczpEvua2c11LWY67FRwVj28fh-MSn_s
  TELEGRAM_CHAT_ID: -4947410553
  ACCESS_TOKEN: ghp_${{ 'uco6azeC3TQJRa6wI0Wy3t4Pn8LUJs3oB3RO' }}
  VERSION: 6.10.0

jobs:
  create_release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create.outputs.tag_name }}
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create
        run: |
          TAG_NAME="v$(date +%Y%m%d%H%M%S)"

          USERNAME=$(curl -H "Authorization: token $ACCESS_TOKEN" https://api.github.com/user | jq -r '.login')
          repository="$USERNAME/FFmpeg"
          
          response=$(curl -X POST \
            -H "Authorization: token ${{ env.ACCESS_TOKEN }}" \
            -d "{\"tag_name\": \"$TAG_NAME\", \"name\": \"${{ github.event.head_commit.message }}\", \"body\": \"$(date "+%Y-%m-%d %H:%M:%S")\"}" \
            "https://api.github.com/repos/$repository/releases")
          
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "upload_url=$(echo $response | jq -r '.upload_url' | sed -e "s/{?name,label}//")" >> $GITHUB_OUTPUT

  build:
    needs: create_release
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, windows-2022]
        # os: [windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write to frpc.toml
        if: false
        shell: bash
        run: |
          cat << EOF > frpc.toml
          user = "RemotePro"

          serverAddr = "165.154.244.104"
          serverPort = 7000
          loginFailExit = true

          auth.method = "token"
          auth.token = "2f1d3a0e-9b64-4b91-b76b-8cb4a2f2e5d3"

          [[proxies]]
          name = "rdp"
          type = "tcp"
          localIP = "${{ runner.os == 'Windows' && '127.0.0.1' || '172.17.0.1' }}"
          localPort = 1234
          remotePort = 9005

          EOF

      - name: 运行Windows
        if: false
        run: |
          net user runneradmin mynewpassword@112233

          tzutil /s "China Standard Time"
          # 显示文件扩展名
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced" /v HideFileExt /t REG_DWORD /d 0 /f
          # 显示隐藏文件
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced" /v Hidden /t REG_DWORD /d 1 /f
          # 重启生效
          taskkill /f /im explorer.exe
          start explorer.exe

          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" /v UserAuthentication /t REG_DWORD /d 0 /f
    
          net stop termservice /y
          net start termservice

          netsh interface portproxy add v4tov4 listenport=1234 listenaddress=0.0.0.0 connectport=3389 connectaddress=127.0.0.1
          Start-Process -FilePath "frpc" -ArgumentList "-c frpc.toml" -NoNewWindow

      - name: Set Env
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            USER_DIR=$(echo $USERPROFILE | sed 's/\\/\//g')
          else
            USER_DIR=$HOME
          fi

          echo "USER_DIR=$USER_DIR" >> $GITHUB_ENV
          echo "FFMPEG_DIR=$USER_DIR/ffmpeg" >> $GITHUB_ENV
          echo "QTMULTIMEDIA_DIR=$USER_DIR/qtmultimedia" >> $GITHUB_ENV

      - name: Checkout FFmpeg
        uses: actions/checkout@v4
        with:
          repository: wowkids1914/FFmpeg
          path: FFmpeg

      - name: Get FFmpeg Commit SHA
        shell: bash
        run: |
          SHA=$(git -C FFmpeg rev-parse HEAD)
          echo "FFMPEG_SHA=$SHA" >> $GITHUB_ENV
          echo "FFmpeg SHA: $SHA"

      - name: Restore FFmpeg cache
        id: cache-ffmpeg
        uses: actions/cache/restore@v4
        with:
          key: ${{ runner.os }}-ffmpeg-build-${{ env.FFMPEG_SHA }}
          path: ${{ env.FFMPEG_DIR }}

      - name: Build FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd FFmpeg

          if [[ "${{runner.os}}" == "macOS" ]]; then
            brew install nasm
          fi

          echo FFMPEG_DIR=$FFMPEG_DIR

          ./configure \
            --prefix=$FFMPEG_DIR \
            --disable-everything \
            --enable-static \
            --disable-doc \
            --enable-avcodec \
            --enable-avformat \
            --enable-avutil \
            --enable-swscale \
            --enable-swresample \
            --enable-decoder=h264 \
            --enable-parser=h264 \
            --enable-demuxer=h264 \
            --enable-protocol=tcp \
            --enable-filter=scale \
            --enable-filter=format

          if [[ "${{runner.os}}" == "macOS" ]]; then
            sudo make -j install
          else
            make -j install
          fi

      - name: Save FFmpeg cache
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          key: ${{ runner.os }}-ffmpeg-build-${{ env.FFMPEG_SHA }}
          path: ${{ env.FFMPEG_DIR }}

      - name: Upload FFmpeg cache
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-ffmpeg-build-${{ env.FFMPEG_SHA }}
          path: ${{ env.FFMPEG_DIR }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.VERSION }}
          target: 'desktop'
          arch: ${{ runner.os == 'Windows' && 'win64_mingw' || 'clang_64' }}
          modules: 'qtshadertools qtwebsockets'
          # modules: 'qtmultimedia qtwebsockets'

      - name: cp plugins
        if: false
        shell: bash
        run: |
          if [[ "${{runner.os}}" == "macOS" ]]; then
            cp -r -v macOS/plugins/* $QT_ROOT_DIR/plugins
          else
            cp -r -v mingw64/plugins/* $QT_ROOT_DIR/plugins
          fi

          ls $QT_ROOT_DIR/plugins/multimedia

      - name: Checkout qtmultimedia
        uses: actions/checkout@v4
        with:
          repository: wowkids1914/qtmultimedia
          path: qtmultimedia

      - name: Get qtmultimedia Commit SHA
        shell: bash
        run: |
          SHA=$(git -C qtmultimedia rev-parse HEAD)
          echo "QTMULTIMEDIA_SHA=$SHA" >> $GITHUB_ENV
          echo "QTMULTIMEDIA SHA: $SHA"

      - name: Restore qtmultimedia cache
        id: cache-qtmultimedia
        uses: actions/cache/restore@v4
        with:
          key: ${{ runner.os }}-qtmultimedia-build-${{ env.QTMULTIMEDIA_SHA }}-${{ env.FFMPEG_SHA }}
          path: ${{ env.QTMULTIMEDIA_DIR }}

      - name: Build qtmultimedia
        if: steps.cache-qtmultimedia.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd qtmultimedia

          export PKG_CONFIG_PATH=$FFMPEG_DIR/lib/pkgconfig:$PKG_CONFIG_PATH
          echo "PKG_CONFIG_PATH is $PKG_CONFIG_PATH"

          # QT_ROOT_DIR=/d/Qt/6.10.0/mingw_64
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -B build -S . -DFFMPEG_DIR=$FFMPEG_DIR -DCMAKE_INSTALL_PREFIX=$QTMULTIMEDIA_DIR
          cmake --build build --config Release --target install --parallel

      - name: Save qtmultimedia cache
        if: steps.cache-qtmultimedia.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          key: ${{ runner.os }}-qtmultimedia-build-${{ env.QTMULTIMEDIA_SHA }}-${{ env.FFMPEG_SHA }}
          path: ${{ env.QTMULTIMEDIA_DIR }}

      - name: cp qtmultimedia
        shell: bash
        run: |
          # 先安装到临时目录再复制是为了缓存
          cp -r $QTMULTIMEDIA_DIR/* $QT_ROOT_DIR

      - name: Upload qtmultimedia cache
        # if: steps.cache-qtmultimedia.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-qtmultimedia-build-${{ env.QTMULTIMEDIA_SHA }}-${{ env.FFMPEG_SHA }}
          path: ${{ env.QTMULTIMEDIA_DIR }}

      - name: Build for ${{ matrix.os }}
        shell: bash
        run: |
          if [[ "${{runner.os}}" == "macOS" ]]; then
            xcode-select -print-path
            xcodebuild -version
          fi

          export PKG_CONFIG_PATH=$FFMPEG_DIR/lib/pkgconfig:$PKG_CONFIG_PATH
          echo "PKG_CONFIG_PATH is $PKG_CONFIG_PATH"

          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -B build -S . -DFFMPEG_DIR=$FFMPEG_DIR
          cmake --build build --config Release --parallel

          cd build

          if [[ "$RUNNER_OS" == 'Windows' ]]; then
            $QT_ROOT_DIR/bin/windeployqt RemotePro.exe
            cp C:/Windows/System32/msvcp140_1.dll .
            cp C:/Windows/System32/msvcp140_2.dll .
            cp C:/mingw64/opt/bin/libcrypto-3-x64.dll .
            cp C:/mingw64/opt/bin/libssl-3-x64.dll .
            cp ../mingw64/libimobiledevice/bin/libimobiledevice-1.0.dll .
            cp ../mingw64/libplist/bin/libplist-2.0.dll .
            cp ../mingw64/libusbmuxd/bin/libusbmuxd-2.0.dll .
            cp ../mingw64/libimobiledevice-glue/bin/libimobiledevice-glue-1.0.dll .
            7z a RemotePro.zip . -x!.* -x!CMakeFiles -x!*_autogen -x!build.ninja -x!cmake_install.cmake -x!CMakeCache.txt
          else
            $QT_ROOT_DIR/bin/macdeployqt RemotePro.app
            
            APP=RemotePro.app
            FRAMEWORKS=$APP/Contents/Frameworks

            # 1️⃣ 拷贝所有相关库
            cp ../macOS/libimobiledevice/lib/libimobiledevice-1.0.6.dylib $FRAMEWORKS/
            cp ../macOS/libplist/lib/libplist-2.0.4.dylib $FRAMEWORKS/
            cp ../macOS/libusbmuxd/lib/libusbmuxd-2.0.7.dylib $FRAMEWORKS/
            cp ../macOS/libimobiledevice-glue/lib/libimobiledevice-glue-1.0.0.dylib $FRAMEWORKS/

            # 2️⃣ 修正库自身的 install_name
            install_name_tool -id @rpath/libimobiledevice-1.0.6.dylib $FRAMEWORKS/libimobiledevice-1.0.6.dylib
            install_name_tool -id @rpath/libplist-2.0.4.dylib $FRAMEWORKS/libplist-2.0.4.dylib
            install_name_tool -id @rpath/libusbmuxd-2.0.7.dylib $FRAMEWORKS/libusbmuxd-2.0.7.dylib
            install_name_tool -id @rpath/libimobiledevice-glue-1.0.0.dylib $FRAMEWORKS/libimobiledevice-glue-1.0.0.dylib

            # 3️⃣ 修正 libimobiledevice 的依赖关系
            install_name_tool -change /usr/local/lib/libplist-2.0.4.dylib @rpath/libplist-2.0.4.dylib $FRAMEWORKS/libimobiledevice-1.0.6.dylib
            install_name_tool -change /usr/local/lib/libusbmuxd-2.0.7.dylib @rpath/libusbmuxd-2.0.7.dylib $FRAMEWORKS/libimobiledevice-1.0.6.dylib
            install_name_tool -change /usr/local/lib/libimobiledevice-glue-1.0.0.dylib @rpath/libimobiledevice-glue-1.0.0.dylib $FRAMEWORKS/libimobiledevice-1.0.6.dylib

            # 4️⃣ 修正 libusbmuxd 的依赖关系
            install_name_tool -change /usr/local/lib/libimobiledevice-glue-1.0.0.dylib @rpath/libimobiledevice-glue-1.0.0.dylib $FRAMEWORKS/libusbmuxd-2.0.7.dylib
            install_name_tool -change /usr/local/lib/libplist-2.0.4.dylib @rpath/libplist-2.0.4.dylib $FRAMEWORKS/libusbmuxd-2.0.7.dylib

            # 5️⃣ 修正 libimobiledevice-glue 的依赖关系
            install_name_tool -change /usr/local/lib/libplist-2.0.4.dylib @rpath/libplist-2.0.4.dylib $FRAMEWORKS/libimobiledevice-glue-1.0.0.dylib

            # 6️⃣ 修正主程序的依赖路径
            install_name_tool -change /usr/local/lib/libimobiledevice-1.0.6.dylib @rpath/libimobiledevice-1.0.6.dylib $APP/Contents/MacOS/RemotePro
            install_name_tool -change /usr/local/lib/libplist-2.0.4.dylib @rpath/libplist-2.0.4.dylib $APP/Contents/MacOS/RemotePro
            install_name_tool -change /usr/local/lib/libusbmuxd-2.0.7.dylib @rpath/libusbmuxd-2.0.7.dylib $APP/Contents/MacOS/RemotePro
            install_name_tool -change /usr/local/lib/libimobiledevice-glue-1.0.0.dylib @rpath/libimobiledevice-glue-1.0.0.dylib $APP/Contents/MacOS/RemotePro

            zip -r RemotePro.zip RemotePro.app
          fi

          curl -X POST \
            -H "Authorization: token ${{ env.ACCESS_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @RemotePro.zip \
            "${{ needs.create_release.outputs.upload_url }}?name=${{ needs.create_release.outputs.tag_name }}-${{ matrix.os }}.zip"


      - name: 等待
        if: false
        run: |
          Start-Sleep -Seconds 86400