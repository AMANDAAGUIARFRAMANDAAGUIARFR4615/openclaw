name: Build Qt Application

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

env:
  TZ: Asia/Shanghai
  ACCESS_TOKEN: ghp_${{ 'uco6azeC3TQJRa6wI0Wy3t4Pn8LUJs3oB3RO' }}
  QT_VERSION: 6.10.2
  ANDROID_NDK_VERSION: 26.3.11579264

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            qt_arch: win64_mingw
            qt_target: desktop
            qt_modules: 'qtshadertools qtwebsockets'
          - os: macos-26-intel
            qt_arch: clang_64
            qt_target: desktop
            qt_modules: 'qtshadertools qtwebsockets'
          - os: macos-26
            qt_arch: ios
            qt_target: ios
            qt_modules: 'qtshadertools qtwebsockets'
          - os: macos-26
            qt_arch: android_arm64_v8a
            qt_target: android
            qt_modules: 'qtshadertools qtwebsockets'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Delete old workflow runs
        if: runner.os == 'macOS' && matrix.qt_arch == 'clang_64'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          echo "Deleting old runs for repo: $REPO"
          # 获取所有已完成的运行记录，保留最近 20 条，其他的删除
          gh run list --repo $REPO --limit 1000 --json databaseId --status completed \
            | jq '.[20:] | .[].databaseId' \
            | xargs -I {} gh run delete {} --repo $REPO
          
          echo "Cleanup complete."

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
       
      - name: Get Release Version
        shell: bash
        run: |
          VERSION=$(perl -nle 'print $1 if /const QString VERSION = "([^"]+)"/' global.h)

          if [ -z "$VERSION" ]; then
            echo "❌ 错误: 无法在 Release 配置中找到 MARKETING_VERSION"
            exit 1
          fi

          echo "✅ 成功获取 Release 版本号: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          arch: ${{ matrix.qt_arch }}
          target: ${{ matrix.qt_target }}
          modules: ${{ matrix.qt_modules }}

      - name: Setup Android SDK
        if: matrix.qt_target == 'android'
        uses: android-actions/setup-android@v3

      - name: Pin Android NDK version
        if: matrix.qt_target == 'android'
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager "ndk;${ANDROID_NDK_VERSION}"
          set -o pipefail
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "Using NDK at: $ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}"

      - name: Prepare Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Set Env
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            USER_DIR=$(echo $USERPROFILE | sed 's/\\/\//g')
          else
            USER_DIR=$HOME
          fi

          echo "USER_DIR=$USER_DIR" >> $GITHUB_ENV
          echo "FFMPEG_DIR=$USER_DIR/ffmpeg" >> $GITHUB_ENV
          echo "QTMULTIMEDIA_DIR=$USER_DIR/qtmultimedia" >> $GITHUB_ENV

      - name: Checkout FFmpeg
        uses: actions/checkout@v4
        with:
          repository: wowkids1914/FFmpeg
          path: FFmpeg

      - name: Get FFmpeg Commit SHA
        shell: bash
        run: |
          SHA=$(git -C FFmpeg rev-parse HEAD)
          SCRIPT_HASH=""
          CACHE_SUFFIX=""
          if [[ "${{ matrix.qt_target }}" == "android" ]]; then
            SCRIPT_HASH=$(shasum android/build_ffmpeg_android.sh | awk '{print $1}')
            CACHE_SUFFIX="-ndk-${ANDROID_NDK_VERSION}"
          elif [[ "${{ matrix.qt_target }}" == "ios" ]]; then
            SCRIPT_HASH=$(shasum ios/build_ffmpeg_xcframework.sh | awk '{print $1}')
          else
            SCRIPT_HASH="no-platform-script"
          fi

          echo "FFMPEG_CACHE_KEY=${{ matrix.os }}-${{ matrix.qt_target }}-ffmpeg-$SHA-$SCRIPT_HASH$CACHE_SUFFIX" >> $GITHUB_ENV
          echo "FFmpeg SHA: $SHA"

      - name: Restore FFmpeg cache
        id: cache-ffmpeg
        uses: actions/cache/restore@v4
        with:
          key: ${{ env.FFMPEG_CACHE_KEY }}
          path: ${{ env.FFMPEG_DIR }}

      - name: Build FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd FFmpeg

          if [[ "${{runner.os}}" == "macOS" ]]; then
            brew install nasm
          else
            cp nasm.exe C:/Windows/System32/
          fi

          if [[ "${{matrix.qt_target}}" == "desktop" ]]; then
            ./configure \
              --prefix=$FFMPEG_DIR \
              --disable-programs \
              --disable-everything \
              --enable-static \
              --disable-doc \
              --enable-avcodec \
              --enable-avformat \
              --enable-avutil \
              --enable-swresample \
              --enable-swscale \
              --enable-decoder=h264 \
              --enable-decoder=aac \
              --enable-parser=h264 \
              --enable-parser=aac \
              --enable-demuxer=h264 \
              --enable-demuxer=mov \
              --enable-protocol=file \
              --enable-protocol=tcp \
              --enable-filter=scale \
              --enable-filter=format \
              --disable-xlib \
              --disable-libxcb

            if [[ "${{runner.os}}" == "macOS" ]]; then
              sudo make -j install
            else
              make -j install
            fi
          elif [[ "${{matrix.qt_target}}" == "ios" ]]; then
            chmod +x ../ios/build_ffmpeg_xcframework.sh
            ../ios/build_ffmpeg_xcframework.sh
          elif [[ "${{matrix.qt_target}}" == "android" ]]; then
            chmod +x ../android/build_ffmpeg_android.sh
            ../android/build_ffmpeg_android.sh
          fi

      - name: Save FFmpeg cache
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          key: ${{ env.FFMPEG_CACHE_KEY }}
          path: ${{ env.FFMPEG_DIR }}

      - name: Upload FFmpeg cache
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FFMPEG_CACHE_KEY }}
          path: ${{ env.FFMPEG_DIR }}

      - name: cp FFmpeg
        if: matrix.qt_target != 'desktop'
        shell: bash
        run: |
          mkdir -p $QT_ROOT_DIR/lib/ffmpeg
          
          # 先安装到临时目录再复制是为了缓存
          cp -r $FFMPEG_DIR/* $QT_ROOT_DIR/lib/ffmpeg
          
          brew install tree
          tree -L 3 $QT_ROOT_DIR/lib/ffmpeg

      - name: Checkout qtmultimedia
        uses: actions/checkout@v4
        with:
          repository: wowkids1914/qtmultimedia
          path: qtmultimedia

      - name: Get qtmultimedia Commit SHA
        shell: bash
        run: |
          SHA=$(git -C qtmultimedia rev-parse HEAD)
          echo "QTMULTIMEDIA_CACHE_KEY=${{ matrix.os }}-${{ matrix.qt_target }}-qtmultimedia-$SHA-${FFMPEG_CACHE_KEY}-${{ env.QT_VERSION }}" >> $GITHUB_ENV
          echo "QTMULTIMEDIA SHA: $SHA"

      - name: Restore qtmultimedia cache
        id: cache-qtmultimedia
        uses: actions/cache/restore@v4
        with:
          key: ${{ env.QTMULTIMEDIA_CACHE_KEY }}
          path: ${{ env.QTMULTIMEDIA_DIR }}

      - name: Build qtmultimedia
        if: steps.cache-qtmultimedia.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd qtmultimedia

          # QT_ROOT_DIR=/d/Qt/6.10.1/mingw_64
          
          if [[ "${{runner.os}}" == "macOS" ]]; then
            CMAKE_EXE="$QT_ROOT_DIR/bin/qt-cmake"
          else
            CMAKE_EXE="cmake"
          fi

          EXTRA_CMAKE_ARGS=()
          if [[ "${{ matrix.qt_target }}" != "android" ]]; then
            EXTRA_CMAKE_ARGS+=("-DCMAKE_OSX_ARCHITECTURES=$(uname -m)")
          fi

          $CMAKE_EXE -G "Ninja" -DCMAKE_BUILD_TYPE=Release -B build -S . -DFFMPEG_DIR=$FFMPEG_DIR -DCMAKE_INSTALL_PREFIX=$QTMULTIMEDIA_DIR "${EXTRA_CMAKE_ARGS[@]}"
          $CMAKE_EXE --build build --config Release --target install --parallel

      - name: Save qtmultimedia cache
        if: steps.cache-qtmultimedia.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          key: ${{ env.QTMULTIMEDIA_CACHE_KEY }}
          path: ${{ env.QTMULTIMEDIA_DIR }}

      - name: Upload qtmultimedia cache
        # if: steps.cache-qtmultimedia.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.QTMULTIMEDIA_CACHE_KEY }}
          path: ${{ env.QTMULTIMEDIA_DIR }}

      - name: cp qtmultimedia
        shell: bash
        run: |
          # 先安装到临时目录再复制是为了缓存
          cp -r $QTMULTIMEDIA_DIR/* $QT_ROOT_DIR

      - name: Build for ${{ matrix.os }}
        shell: bash
        run: |
          if [[ "${{runner.os}}" == "macOS" ]]; then
            CMAKE_EXE="$QT_ROOT_DIR/bin/qt-cmake"
          else
            CMAKE_EXE="cmake"
          fi

          $CMAKE_EXE -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="-w" -DCMAKE_CXX_FLAGS="-w" -B build -S .
          $CMAKE_EXE --build build --config Release --parallel

          if [[ "$RUNNER_OS" == 'Windows' ]]; then
            mkdir -p dist
            cp build/RemotePro.exe dist/
            cd dist
            $QT_ROOT_DIR/bin/windeployqt --release --translations zh_CN RemotePro.exe
            echo "Package created successfully."

            ls

            cp C:/Windows/System32/msvcp140_1.dll .
            cp C:/Windows/System32/msvcp140_2.dll .
            cp C:/mingw64/opt/bin/libcrypto-3-x64.dll .
            cp C:/mingw64/opt/bin/libssl-3-x64.dll .
            cp ../mingw64/libimobiledevice/bin/libimobiledevice-1.0.dll .
            cp ../mingw64/libplist/bin/libplist-2.0.dll .
            cp ../mingw64/libusbmuxd/bin/libusbmuxd-2.0.dll .
            cp ../mingw64/libimobiledevice-glue/bin/libimobiledevice-glue-1.0.dll .
            
            7z a ../build/RemotePro-${{ matrix.os }}-${{ matrix.qt_target }}.zip *
            
          elif [[ "${{ matrix.qt_target }}" == 'ios' ]]; then
            cd build
            
            APP=RemotePro.app

            mkdir -p Payload
            cp -r $APP Payload/
            
            zip -r RemotePro.ipa Payload/
          elif [[ "${{ matrix.qt_target }}" == 'android' ]]; then
            APK_PATH=$(find build -type f -name "*.apk" | sed -n '1p')
            if [[ -z "$APK_PATH" ]]; then
              echo "❌ Android APK not found under build/"
              exit 1
            fi

            cp "$APK_PATH" "build/RemotePro.apk"

          else
            cd build
            $QT_ROOT_DIR/bin/macdeployqt RemotePro.app

            ls

            APP=RemotePro.app
            FRAMEWORKS=$APP/Contents/Frameworks

            cp -r ../translations $APP/Contents/MacOS/

            # 1️⃣ 拷贝所有相关库
            cp /usr/local/opt/openssl/lib/libcrypto.3.dylib $FRAMEWORKS/
            cp ../macOS/libimobiledevice/lib/libimobiledevice-1.0.6.dylib $FRAMEWORKS/
            cp ../macOS/libplist/lib/libplist-2.0.4.dylib $FRAMEWORKS/
            cp ../macOS/libusbmuxd/lib/libusbmuxd-2.0.7.dylib $FRAMEWORKS/
            cp ../macOS/libimobiledevice-glue/lib/libimobiledevice-glue-1.0.0.dylib $FRAMEWORKS/

            # 2️⃣ 修正库自身的 install_name
            install_name_tool -id @rpath/libimobiledevice-1.0.6.dylib $FRAMEWORKS/libimobiledevice-1.0.6.dylib
            install_name_tool -id @rpath/libplist-2.0.4.dylib $FRAMEWORKS/libplist-2.0.4.dylib
            install_name_tool -id @rpath/libusbmuxd-2.0.7.dylib $FRAMEWORKS/libusbmuxd-2.0.7.dylib
            install_name_tool -id @rpath/libimobiledevice-glue-1.0.0.dylib $FRAMEWORKS/libimobiledevice-glue-1.0.0.dylib

            # 3️⃣ 修正 libimobiledevice 的依赖关系
            install_name_tool -change /usr/local/lib/libplist-2.0.4.dylib @rpath/libplist-2.0.4.dylib $FRAMEWORKS/libimobiledevice-1.0.6.dylib
            install_name_tool -change /usr/local/lib/libusbmuxd-2.0.7.dylib @rpath/libusbmuxd-2.0.7.dylib $FRAMEWORKS/libimobiledevice-1.0.6.dylib
            install_name_tool -change /usr/local/lib/libimobiledevice-glue-1.0.0.dylib @rpath/libimobiledevice-glue-1.0.0.dylib $FRAMEWORKS/libimobiledevice-1.0.6.dylib

            # 4️⃣ 修正 libusbmuxd 的依赖关系
            install_name_tool -change /usr/local/lib/libimobiledevice-glue-1.0.0.dylib @rpath/libimobiledevice-glue-1.0.0.dylib $FRAMEWORKS/libusbmuxd-2.0.7.dylib
            install_name_tool -change /usr/local/lib/libplist-2.0.4.dylib @rpath/libplist-2.0.4.dylib $FRAMEWORKS/libusbmuxd-2.0.7.dylib

            # 5️⃣ 修正 libimobiledevice-glue 的依赖关系
            install_name_tool -change /usr/local/lib/libplist-2.0.4.dylib @rpath/libplist-2.0.4.dylib $FRAMEWORKS/libimobiledevice-glue-1.0.0.dylib

            # 6️⃣ 修正主程序的依赖路径
            install_name_tool -change /usr/local/lib/libimobiledevice-1.0.6.dylib @rpath/libimobiledevice-1.0.6.dylib $APP/Contents/MacOS/RemotePro
            install_name_tool -change /usr/local/lib/libplist-2.0.4.dylib @rpath/libplist-2.0.4.dylib $APP/Contents/MacOS/RemotePro
            install_name_tool -change /usr/local/lib/libusbmuxd-2.0.7.dylib @rpath/libusbmuxd-2.0.7.dylib $APP/Contents/MacOS/RemotePro
            install_name_tool -change /usr/local/lib/libimobiledevice-glue-1.0.0.dylib @rpath/libimobiledevice-glue-1.0.0.dylib $APP/Contents/MacOS/RemotePro

            zip -r RemotePro-${{ matrix.os }}-${{ matrix.qt_target }}.zip RemotePro.app
          fi

      - name: Run Fastlane
        if: matrix.qt_target == 'ios' || matrix.qt_target == 'android'
        env:
          # P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          P12_PASSWORD: QJsonValue
        run: |
          gem install fastlane
          if [[ "${{ matrix.qt_target }}" == "ios" ]]; then
            fastlane ios build_and_sign
          else
            fastlane android sign_release
          fi

      - name: 发布 Release
        uses: softprops/action-gh-release@v2.4.2
        with:
          repository: MinhJapan5220/FFmpeg
          tag_name: ${{ env.VERSION }}
          files: build/RemotePro*.{zip,ipa,apk}
          body: |
            ${{ github.event.head_commit.timestamp }}
            ${{ github.event.head_commit.message }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ env.ACCESS_TOKEN }}

  # Qt for WebAssembly：与桌面/移动矩阵分离，无 FFmpeg / Vulkan / 自编译 qtmultimedia
  build-web:
    runs-on: ubuntu-22.04
    env:
      TZ: Asia/Shanghai
      QT_VERSION: 6.10.2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get Release Version
        shell: bash
        run: |
          VERSION=$(perl -nle 'print $1 if /const QString VERSION = "([^"]+)"/' global.h)

          if [ -z "$VERSION" ]; then
            echo "❌ 错误: 无法在 global.h 中获取 VERSION"
            exit 1
          fi

          echo "✅ 成功获取版本号: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Qt (WebAssembly)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          host: all_os
          target: wasm
          arch: wasm_singlethread
          modules: 'qtshadertools qtwebsockets'

      - name: Ensure Qt wasm tools are executable
        shell: bash
        run: |
          if [[ -d "${QT_ROOT_DIR}/bin" ]]; then
            chmod +x "${QT_ROOT_DIR}/bin/"* 2>/dev/null || true
          fi

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      # Qt 官方二进制用固定 Emscripten 版本构建，应用须使用相同主版本（见 doc.qt.io/qt-6.10/wasm.html）
      - name: Setup Emscripten SDK
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 4.0.7
          actions-cache-folder: emsdk-cache

      - name: Configure & Build (Web)
        shell: bash
        run: |
          set -euo pipefail
          # Qt CMake 需 EMSDK 指向 emsdk 根目录；部分环境下仅注入 PATH 未设置该变量，从 emcc 路径推断
          if [[ -z "${EMSDK:-}" ]]; then
            EMCC_PATH="$(command -v emcc)"
            export EMSDK="$(cd "$(dirname "$EMCC_PATH")/../.." && pwd)"
          fi
          echo "Using EMSDK=$EMSDK"
          TOOLCHAIN="$EMSDK/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake"
          if [[ ! -f "$TOOLCHAIN" ]]; then
            echo "❌ 未找到 Emscripten.cmake: $TOOLCHAIN"
            exit 1
          fi

          NINJA_BIN="$(command -v ninja)"
          CMAKE_EXE="${QT_ROOT_DIR}/bin/qt-cmake"
          CMAKE_ARGS=(
            -G Ninja
            "-DCMAKE_MAKE_PROGRAM=${NINJA_BIN}"
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_C_FLAGS=-w
            -DCMAKE_CXX_FLAGS=-w
            -B build
            -S .
          )
          if [[ ! -x "$CMAKE_EXE" ]]; then
            echo "Running qt-cmake via bash (non-executable bit)..."
            bash "$CMAKE_EXE" "${CMAKE_ARGS[@]}"
          else
            "$CMAKE_EXE" "${CMAKE_ARGS[@]}"
          fi
          cmake --build build --config Release --parallel

      - name: Pack web artifacts
        shell: bash
        run: |
          set -euo pipefail
          OUT="RemotePro-${{ env.VERSION }}-web.zip"
          cd build
          # 常见 Qt6 WASM / Emscripten 输出
          mapfile -t ASSETS < <(find . -maxdepth 4 -type f \( \
            -name '*.wasm' -o -name '*.js' -o -name '*.html' -o -name '*.data' -o -name '*.json' \
            \) 2>/dev/null | sort -u)
          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "⚠️ 未匹配到典型 wasm 产物，改为打包 build 目录（排除 CMake 中间文件，体积可能较大）"
            cd ..
            zip -r -q "$OUT" build \
              -x 'build/CMakeFiles/*' \
              -x 'build/*/CMakeFiles/*' \
              -x '*.o' -x '*.a'
          else
            zip -r -q "../$OUT" "${ASSETS[@]}"
            cd ..
          fi
          ls -la "$OUT"

      - name: Upload web package
        uses: actions/upload-artifact@v4
        with:
          name: RemotePro-web-${{ env.VERSION }}
          path: RemotePro-${{ env.VERSION }}-web.zip
